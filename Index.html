<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake - Glass Edition</title>
  <style>
    :root {
      --bg-a: #eef3ff;
      --bg-b: #dfe9ff;
      --panel: rgba(255, 255, 255, 0.62);
      --panel-border: rgba(255, 255, 255, 0.9);
      --text: #0b1420;
      --muted: #6c7785;
      --accent: #0a84ff;
      --accent-2: #5ac8fa;
      --danger: #ff3b30;
      --line: rgba(12, 23, 38, 0.08);
      --snake-head: #0a84ff;
      --snake-body: #2f9fff;
      --food: #ff6b5d;
      --shadow: 0 28px 70px rgba(13, 31, 63, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "SF Pro Display", "SF Pro Text", "Segoe UI", "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(90, 200, 250, 0.2), transparent 38%),
        radial-gradient(circle at 85% 80%, rgba(10, 132, 255, 0.2), transparent 40%),
        linear-gradient(145deg, var(--bg-a), var(--bg-b));
    }

    body {
      display: grid;
      place-items: center;
      padding: clamp(14px, 2.6vw, 28px);
    }

    .app {
      width: min(1100px, 100%);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 34px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      padding: clamp(14px, 2.2vw, 28px);
      display: grid;
      gap: clamp(12px, 1.6vw, 18px);
      animation: rise 500ms ease-out;
    }

    @keyframes rise {
      from {
        transform: translateY(14px) scale(0.988);
        opacity: 0;
      }
      to {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .title {
      font-size: clamp(1.15rem, 2.3vw, 1.6rem);
      font-weight: 650;
      letter-spacing: -0.02em;
      margin: 0;
    }

    .subtitle {
      margin: 2px 0 0;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .stats {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chip {
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.95);
      border-radius: 999px;
      padding: 7px 12px;
      font-weight: 600;
      font-size: 0.86rem;
      letter-spacing: 0.01em;
      color: #1d2c40;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.75);
      user-select: none;
      white-space: nowrap;
    }

    .stage {
      border-radius: 24px;
      padding: clamp(10px, 1.6vw, 16px);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(246, 250, 255, 0.88));
      border: 1px solid rgba(255, 255, 255, 0.95);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 1),
        0 10px 30px rgba(18, 34, 56, 0.09);
    }

    .screen-wrap {
      position: relative;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.9);
      background: linear-gradient(180deg, #f7fbff, #ebf3ff);
      box-shadow: inset 0 0 0 1px rgba(10, 20, 35, 0.05);
    }

    canvas {
      width: 100%;
      height: min(70vh, 680px);
      display: block;
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        linear-gradient(180deg, #f7fbff 0%, #ebf3ff 100%);
      background-size: 32px 32px, 32px 32px, 100% 100%;
      border-radius: 16px;
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 85% 14%, rgba(255, 255, 255, 0.65), transparent 34%),
        linear-gradient(155deg, rgba(255, 255, 255, 0.5), transparent 32%);
    }

    .status {
      margin-top: 12px;
      min-height: 20px;
      text-align: center;
      color: #294464;
      font-size: 0.9rem;
      font-weight: 550;
      letter-spacing: 0.01em;
    }

    .status.danger {
      color: var(--danger);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      color: white;
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      box-shadow:
        0 8px 18px rgba(10, 132, 255, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
      transition: transform 130ms ease, filter 130ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn.secondary {
      color: #1f334b;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(18, 40, 70, 0.08);
      box-shadow: 0 7px 18px rgba(18, 40, 70, 0.09);
    }

    .btn:active,
    .btn.active {
      transform: translateY(1px) scale(0.985);
      filter: brightness(0.98);
    }

    .hint {
      color: var(--muted);
      font-size: 0.84rem;
      white-space: nowrap;
    }

    @media (max-width: 860px) {
      canvas {
        height: min(62vh, 540px);
      }

      .controls {
        justify-content: center;
      }

      .hint {
        text-align: center;
        white-space: normal;
      }
    }

    @media (max-width: 560px) {
      .app {
        border-radius: 24px;
      }

      .title {
        font-size: 1.08rem;
      }

      canvas {
        height: min(56vh, 460px);
      }

      .btn {
        flex: 1;
        text-align: center;
      }

      .buttons {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Modern Snake game">
    <section class="topbar">
      <div>
        <h1 class="title">Snake - Glass Edition</h1>
        <p class="subtitle">Classic gameplay, Apple-inspired visual design</p>
      </div>
      <div class="stats" aria-live="polite">
        <div id="scoreLabel" class="chip">Score: 0</div>
        <div id="bestLabel" class="chip">Best: 0</div>
        <div id="levelLabel" class="chip">Level: 1</div>
      </div>
    </section>

    <section class="stage">
      <div class="screen-wrap">
        <canvas id="game" width="960" height="640" role="img" aria-label="Snake game board"></canvas>
        <div class="overlay" aria-hidden="true"></div>
      </div>
      <div id="status" class="status">Press Start or use Arrow keys</div>
    </section>

    <section class="controls">
      <div class="buttons">
        <button class="btn" id="startBtn">Start / Pause</button>
        <button class="btn secondary" id="restartBtn">Restart</button>
        <button class="btn secondary" id="speedBtn">Speed: Normal</button>
      </div>
      <div class="hint">Controls: Arrow Keys or Swipe | Enter to Start/Pause | R to Restart</div>
    </section>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      const scoreLabel = document.getElementById("scoreLabel");
      const bestLabel = document.getElementById("bestLabel");
      const levelLabel = document.getElementById("levelLabel");
      const status = document.getElementById("status");

      const startBtn = document.getElementById("startBtn");
      const restartBtn = document.getElementById("restartBtn");
      const speedBtn = document.getElementById("speedBtn");

      const STORAGE_KEY = "snake_glass_best_score";
      const GRID_SIZE = 32;
      const COLS = Math.floor(canvas.width / GRID_SIZE);
      const ROWS = Math.floor(canvas.height / GRID_SIZE);

      const SPEED_MODES = [
        { label: "Slow", base: 175 },
        { label: "Normal", base: 135 },
        { label: "Fast", base: 100 }
      ];

      const palette = {
        snakeHead: "#0a84ff",
        snakeBodyA: "#2f9fff",
        snakeBodyB: "#66b7ff",
        food: "#ff6b5d",
        foodGlow: "rgba(255, 107, 93, 0.35)",
        text: "#1f334a",
        overlay: "rgba(12, 28, 46, 0.14)"
      };

      let snake = [];
      let direction = { x: 1, y: 0 };
      let queuedDirection = { x: 1, y: 0 };
      let food = { x: 0, y: 0 };
      let score = 0;
      let level = 1;
      let best = Number(localStorage.getItem(STORAGE_KEY) || 0);
      let running = false;
      let paused = false;
      let gameOver = false;
      let speedIndex = 1;
      let tickMs = SPEED_MODES[speedIndex].base;
      let timer = null;

      let touchStartX = 0;
      let touchStartY = 0;

      function setStatus(text, danger = false) {
        status.textContent = text;
        status.classList.toggle("danger", danger);
      }

      function updateHud() {
        scoreLabel.textContent = `Score: ${score}`;
        bestLabel.textContent = `Best: ${best}`;
        levelLabel.textContent = `Level: ${level}`;
      }

      function updateSpeedButton() {
        speedBtn.textContent = `Speed: ${SPEED_MODES[speedIndex].label}`;
      }

      function initialSnake() {
        const cx = Math.floor(COLS / 2);
        const cy = Math.floor(ROWS / 2);
        return [
          { x: cx, y: cy },
          { x: cx - 1, y: cy },
          { x: cx - 2, y: cy }
        ];
      }

      function spawnFood() {
        let fx;
        let fy;
        do {
          fx = Math.floor(Math.random() * COLS);
          fy = Math.floor(Math.random() * ROWS);
        } while (snake.some((p) => p.x === fx && p.y === fy));
        food = { x: fx, y: fy };
      }

      function clearTimer() {
        if (timer) {
          clearInterval(timer);
          timer = null;
        }
      }

      function resetGame() {
        clearTimer();
        snake = initialSnake();
        direction = { x: 1, y: 0 };
        queuedDirection = { x: 1, y: 0 };
        score = 0;
        level = 1;
        running = false;
        paused = false;
        gameOver = false;
        tickMs = SPEED_MODES[speedIndex].base;
        spawnFood();
        updateHud();
        setStatus("Press Start or use Arrow keys");
        draw();
      }

      function beginGame() {
        if (gameOver) {
          resetGame();
        }
        if (running && !paused) {
          return;
        }
        running = true;
        paused = false;
        setStatus("Running");
        clearTimer();
        timer = setInterval(gameLoop, tickMs);
      }

      function togglePause() {
        if (!running || gameOver) {
          beginGame();
          return;
        }

        paused = !paused;
        if (paused) {
          clearTimer();
          setStatus("Paused");
        } else {
          setStatus("Running");
          timer = setInterval(gameLoop, tickMs);
        }
        draw();
      }

      function setSpeed() {
        speedIndex = (speedIndex + 1) % SPEED_MODES.length;
        updateSpeedButton();
        const base = SPEED_MODES[speedIndex].base;
        tickMs = Math.max(base - (level - 1) * 6, 60);
        if (running && !paused && !gameOver) {
          clearTimer();
          timer = setInterval(gameLoop, tickMs);
        }
        setStatus(`Speed: ${SPEED_MODES[speedIndex].label}`);
      }

      function updateLevel() {
        const next = Math.min(1 + Math.floor(score / 4), 12);
        if (next !== level) {
          level = next;
          const base = SPEED_MODES[speedIndex].base;
          tickMs = Math.max(base - (level - 1) * 6, 60);
          if (running && !paused && !gameOver) {
            clearTimer();
            timer = setInterval(gameLoop, tickMs);
          }
        }
      }

      function canTurn(nx, ny) {
        return !(direction.x === -nx && direction.y === -ny);
      }

      function setDirectionByName(name) {
        const map = {
          up: { x: 0, y: -1 },
          down: { x: 0, y: 1 },
          left: { x: -1, y: 0 },
          right: { x: 1, y: 0 }
        };
        const next = map[name];
        if (!next) {
          return;
        }
        if (canTurn(next.x, next.y)) {
          queuedDirection = next;
          if (!running) {
            beginGame();
          }
        }
      }

      function handleKey(event) {
        const key = event.key;
        if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Enter", " "].includes(key)) {
          event.preventDefault();
        }

        if (key === "ArrowUp") {
          setDirectionByName("up");
        } else if (key === "ArrowDown") {
          setDirectionByName("down");
        } else if (key === "ArrowLeft") {
          setDirectionByName("left");
        } else if (key === "ArrowRight") {
          setDirectionByName("right");
        } else if (key === "Enter" || key === " ") {
          togglePause();
        } else if (key.toLowerCase() === "r") {
          resetGame();
        }
      }

      function onTouchStart(event) {
        const t = event.changedTouches[0];
        touchStartX = t.clientX;
        touchStartY = t.clientY;
      }

      function onTouchEnd(event) {
        const t = event.changedTouches[0];
        const dx = t.clientX - touchStartX;
        const dy = t.clientY - touchStartY;
        const threshold = 24;

        if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) {
          return;
        }

        if (Math.abs(dx) > Math.abs(dy)) {
          setDirectionByName(dx > 0 ? "right" : "left");
        } else {
          setDirectionByName(dy > 0 ? "down" : "up");
        }
      }

      function roundedRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
      }

      function drawSnakePart(part, i) {
        const x = part.x * GRID_SIZE;
        const y = part.y * GRID_SIZE;
        const inset = 3;
        const size = GRID_SIZE - inset * 2;

        ctx.fillStyle = i === 0 ? palette.snakeHead : i % 2 ? palette.snakeBodyA : palette.snakeBodyB;
        roundedRect(x + inset, y + inset, size, size, 9);
        ctx.fill();

        ctx.fillStyle = "rgba(255,255,255,0.4)";
        roundedRect(x + inset + 4, y + inset + 4, size - 10, 7, 4);
        ctx.fill();
      }

      function drawFood() {
        const cx = food.x * GRID_SIZE + GRID_SIZE / 2;
        const cy = food.y * GRID_SIZE + GRID_SIZE / 2;
        const r = GRID_SIZE * 0.28;

        ctx.beginPath();
        ctx.fillStyle = palette.foodGlow;
        ctx.arc(cx, cy, r + 8, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.fillStyle = palette.food;
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.fillStyle = "rgba(255,255,255,0.6)";
        ctx.arc(cx - 4, cy - 4, 4, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawOverlay() {
        if (running && !paused && !gameOver) {
          return;
        }

        ctx.fillStyle = palette.overlay;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = palette.text;
        ctx.textAlign = "center";
        ctx.font = "700 52px 'SF Pro Display', 'Segoe UI', sans-serif";

        let title = "Snake";
        let sub = "Press Start";

        if (paused) {
          title = "Paused";
          sub = "Press Start to continue";
        } else if (gameOver) {
          title = "Game Over";
          sub = "Press Restart or Enter";
        }

        ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 10);
        ctx.font = "500 24px 'SF Pro Text', 'Segoe UI', sans-serif";
        ctx.fillStyle = "rgba(29, 50, 75, 0.86)";
        ctx.fillText(sub, canvas.width / 2, canvas.height / 2 + 35);
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        drawFood();
        snake.forEach((part, i) => drawSnakePart(part, i));
        drawOverlay();
      }

      function gameLoop() {
        direction = queuedDirection;

        const nextHead = {
          x: snake[0].x + direction.x,
          y: snake[0].y + direction.y
        };

        const out = nextHead.x < 0 || nextHead.y < 0 || nextHead.x >= COLS || nextHead.y >= ROWS;
        const self = snake.some((p) => p.x === nextHead.x && p.y === nextHead.y);

        if (out || self) {
          running = false;
          paused = false;
          gameOver = true;
          clearTimer();

          if (score > best) {
            best = score;
            localStorage.setItem(STORAGE_KEY, String(best));
          }

          updateHud();
          setStatus("Game Over - Press Restart or Enter", true);
          draw();
          return;
        }

        snake.unshift(nextHead);

        if (nextHead.x === food.x && nextHead.y === food.y) {
          score += 1;
          spawnFood();
          updateLevel();
        } else {
          snake.pop();
        }

        updateHud();
        draw();
      }

      window.addEventListener("keydown", handleKey, { passive: false });
      canvas.addEventListener("touchstart", onTouchStart, { passive: true });
      canvas.addEventListener("touchend", onTouchEnd, { passive: true });

      startBtn.addEventListener("click", () => {
        startBtn.classList.add("active");
        setTimeout(() => startBtn.classList.remove("active"), 120);
        togglePause();
      });

      restartBtn.addEventListener("click", () => {
        restartBtn.classList.add("active");
        setTimeout(() => restartBtn.classList.remove("active"), 120);
        resetGame();
      });

      speedBtn.addEventListener("click", () => {
        speedBtn.classList.add("active");
        setTimeout(() => speedBtn.classList.remove("active"), 120);
        setSpeed();
      });

      updateSpeedButton();
      updateHud();
      resetGame();
    })();
  </script>
</body>
</html>
